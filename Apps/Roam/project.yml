name: Roam
options:
  bundleIdPrefix: com.roam
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO

packages:
  RoamCore:
    path: ../../Packages/RoamCore

targets:
  Roam:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources/Roam
    info:
      path: Sources/Roam/Info.plist
      properties:
        CFBundleDisplayName: roam
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Light
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.roam.app
        PRODUCT_NAME: Roam
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    dependencies:
      - package: RoamCore
        product: RoamCore

schemes:
  Roam:
    build:
      targets:
        Roam: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
