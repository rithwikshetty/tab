name: Tab
configFiles:
  Debug: Config/Base.xcconfig
  Release: Config/Base.xcconfig
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: $(TAB_DEVELOPMENT_TEAM)
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO

packages:
  TabCore:
    path: ../../Packages/TabCore
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.46.0"

targets:
  Tab:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources/Tab
    info:
      path: Sources/Tab/Info.plist
      properties:
        CFBundleDisplayName: tab-it
        CFBundleShortVersionString: "1.0.0"
        CFBundleURLTypes:
          - CFBundleURLName: $(TAB_AUTH_CALLBACK_SCHEME).auth
            CFBundleURLSchemes:
              - $(TAB_AUTH_CALLBACK_SCHEME)
        CFBundleVersion: "13"
        TABSupabaseURL: $(TAB_SUPABASE_URL)
        TABSupabasePublishableKey: $(TAB_SUPABASE_PUBLISHABLE_KEY)
        TABAuthCallbackScheme: $(TAB_AUTH_CALLBACK_SCHEME)
        TABTurnstileSiteKey: $(TAB_TURNSTILE_SITE_KEY)
        UILaunchScreen: {}
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Light
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(TAB_BUNDLE_ID)
        PRODUCT_NAME: Tab
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_ENTITLEMENTS: Sources/Tab/Tab.entitlements
    dependencies:
      - package: TabCore
        product: TabCore
      - package: Supabase
        product: Supabase

  TabUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/TabUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: $(TAB_BUNDLE_ID).uitests
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    dependencies:
      - target: Tab

  TabTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/TabTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: $(TAB_BUNDLE_ID).tests
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    dependencies:
      - target: Tab

schemes:
  Tab:
    build:
      targets:
        Tab: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TabTests
        - TabUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
